{% if access_list_id > 0 %}
    {% if access_list.items.length > 0 %}
    # Access List Authentication
    
    # Check if we have Keycloak or Authelia configured
    {% assign has_auth_provider = false %}
    {% assign has_keycloak = false %}
    {% assign has_authelia = false %}
    {% for item in access_list.items %}
        {% if item.auth_type == 'keycloak' %}
            {% assign has_auth_provider = true %}
            {% assign has_keycloak = true %}
        {% endif %}
        {% if item.auth_type == 'authelia' %}
            {% assign has_auth_provider = true %}
            {% assign has_authelia = true %}
        {% endif %}
    {% endfor %}
    
    # Include basic auth configuration (if present)
    {% assign has_basic_auth = false %}
    {% for item in access_list.items %}
        {% if item.auth_type == 'basic' or item.auth_type == null %}
            {% assign has_basic_auth = true %}
        {% endif %}
    {% endfor %}
    
    {% if has_basic_auth %}
    # Basic Authentication
    auth_basic            "Authorization required";
    auth_basic_user_file  /data/access/{{ access_list_id }};
    {% endif %}
    
    # Include provider configuration if available
    {% if has_auth_provider %}
    include /data/access/{{ access_list_id }}.providers;
    {% endif %}
    
    {% unless access_list.pass_auth %}
    proxy_set_header Authorization "";
    {% endunless %}
    {% endif %}

    # Access Rules: {{ access_list.clients | size }} total
    {% for client in access_list.clients %}
    {{client | nginxAccessRule}}
    {% endfor %}
    deny all;

    # Access checks must...
    {% if access_list.satisfy_any %}
    satisfy any;
    {% else %}
    satisfy all;
    {% endif %}
{% endif %}
